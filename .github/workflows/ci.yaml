name: 🛠 Build & Release

on:
  push:
    branches: [main, master]
    paths:
      - /nuanyu/assets/**/*
      - /nuanyu/lib/**/*.dart
      - /nuanyu/pubspec.yaml
      - /nuanyu/pubspec.lock
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  android:
    uses: ./.github/workflows/android.yaml
