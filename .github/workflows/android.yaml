name: 🛠 Android CI / Build & Release APK

on:
  workflow_call:
    secrets:
      KEYSTORE_BASE64:
        required: true
      KEY_ALIAS:
        required: true
      KEY_PASSWORD:
        required: true
      STORE_PASSWORD:
        required: true

permissions:
  contents: write # allow creating/updating Releases & uploading assets
  actions: read # allow pulling marketplace actions

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v6

      - name: 🚀 Cache pub deps
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: ☕️ Setup Java (Temurin 17)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: 📥 Get dependencies
        run: |
          cd nuanyu
          flutter pub get

      - name: 🚧 Codegen
        run: |
          cd nuanyu
          dart run build_runner build

      - name: 🔑 Setup release signing
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > nuanyu/android/release.keystore
          cat > nuanyu/android/key.properties <<-EOF
          storeFile=release.keystore
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          EOF

      - name: 🏗️ Build APKs
        run: |
          cd nuanyu
          flutter build apk --release --split-per-abi --target-platform android-arm64,android-x64

      - name: 📦 Prepare artifacts
        run: |
          mkdir -p artifacts
          cp nuanyu/build/app/outputs/flutter-apk/*.apk artifacts/

      - name: 🐞 Upload v8a build to action artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-aarch64
          path: artifacts/app-arm64-v8a-release.apk
          retention-days: 90

      - name: 🐞 Upload x64 build to action artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-x86_64
          path: artifacts/app-x86_64-release.apk
          retention-days: 90

      # ─────────────── ONLY ON TAGS ───────────────
      - name: 🏷️ Create or update Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          artifacts: artifacts/*.apk
